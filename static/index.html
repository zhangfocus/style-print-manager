<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>款式印花管理系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
<style>
  body { background: #f0f2f5; }
  .sidebar { width: 220px; min-height: 100vh; background: #1a2035; }
  .sidebar .logo { padding: 20px 16px 10px; color: #fff; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  .sidebar .nav-link { color: #adb5bd; padding: 10px 20px; font-size: 14px; border-radius: 6px; margin: 2px 8px; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2563eb; color: #fff; }
  .sidebar .nav-link i { margin-right: 8px; font-size: 16px; }
  .main { flex: 1; padding: 24px; }
  .card { border: none; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
  .page { display: none; }
  .page.active { display: block; }
  .badge-active { background: #d1fae5; color: #065f46; }
  .badge-inactive { background: #fee2e2; color: #991b1b; }
  .table th { background: #f8fafc; font-size: 13px; font-weight: 600; }
  .table td { font-size: 13px; vertical-align: middle; }
  .action-btns .btn { padding: 2px 10px; font-size: 12px; }
  .import-area { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: .2s; }
  .import-area:hover { border-color: #2563eb; background: #eff6ff; }
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
  .restriction-tag { display: inline-block; background: #dbeafe; color: #1d4ed8; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin: 2px; }
</style>
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column">
    <div class="logo"><i class="bi bi-grid-3x3-gap-fill"></i> 印花管理</div>
    <ul class="nav flex-column mt-2">
      <li class="nav-item"><a class="nav-link active" href="#" data-page="styles"><i class="bi bi-hanger"></i> 款式管理</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-page="prints"><i class="bi bi-flower1"></i> 印花管理</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-page="positions"><i class="bi bi-geo-alt"></i> 位置管理</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-page="restrictions"><i class="bi bi-diagram-3"></i> 限定管理</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="#" data-page="excel"><i class="bi bi-file-earmark-excel"></i> Excel 导入/导出</a></li>
    </ul>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- ===== 款式 ===== -->
    <div class="page active" id="page-styles">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">款式管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openModal('style')"><i class="bi bi-plus"></i> 新增款式</button>
      </div>
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2 py-2">
          <input type="text" id="style-search" class="form-control form-control-sm" style="width:200px" placeholder="搜索编号/名称" oninput="loadStyles()">
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="style-table">
            <thead><tr><th>编号</th><th>名称</th><th>品类</th><th>颜色</th><th>备注</th><th>状态</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== 印花 ===== -->
    <div class="page" id="page-prints">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">印花管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openModal('print')"><i class="bi bi-plus"></i> 新增印花</button>
      </div>
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2 py-2">
          <input type="text" id="print-search" class="form-control form-control-sm" style="width:200px" placeholder="搜索编号/名称" oninput="loadPrints()">
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="print-table">
            <thead><tr><th>编号</th><th>名称</th><th>图案类型</th><th>色系</th><th>备注</th><th>状态</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== 位置 ===== -->
    <div class="page" id="page-positions">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">位置管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openModal('position')"><i class="bi bi-plus"></i> 新增位置</button>
      </div>
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2 py-2">
          <input type="text" id="position-search" class="form-control form-control-sm" style="width:200px" placeholder="搜索编号/名称" oninput="loadPositions()">
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="position-table">
            <thead><tr><th>编号</th><th>名称</th><th>区域</th><th>备注</th><th>状态</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== 限定 ===== -->
    <div class="page" id="page-restrictions">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">限定管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openModal('restriction')"><i class="bi bi-plus"></i> 新增限定</button>
      </div>
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2 py-2">
          <select id="r-filter-style" class="form-select form-select-sm" style="width:160px" onchange="loadRestrictions()">
            <option value="">全部款式</option>
          </select>
          <select id="r-filter-position" class="form-select form-select-sm" style="width:160px" onchange="loadRestrictions()">
            <option value="">全部位置</option>
          </select>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="restriction-table">
            <thead><tr><th>款式</th><th>位置</th><th>印花</th><th>状态</th><th>备注</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== Excel ===== -->
    <div class="page" id="page-excel">
      <h5 class="mb-3 fw-bold">Excel 导入 / 导出</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-header">导入数据</div>
            <div class="card-body">
              <div class="import-area" id="drop-zone" onclick="document.getElementById('excel-file').click()">
                <i class="bi bi-cloud-upload fs-1 text-primary"></i>
                <p class="mt-2 text-muted">点击或拖拽 Excel 文件至此区域</p>
                <p class="small text-muted">支持 .xlsx 格式，按模板格式填写</p>
                <input type="file" id="excel-file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)">
              </div>
              <div id="import-result" class="mt-3"></div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-header">模板 & 导出</div>
            <div class="card-body d-flex flex-column gap-3 pt-4">
              <a href="/api/excel/template" class="btn btn-outline-primary">
                <i class="bi bi-download me-2"></i>下载导入模板（含示例数据）
              </a>
              <a href="/api/excel/export" class="btn btn-success">
                <i class="bi bi-file-earmark-excel me-2"></i>导出当前全部数据
              </a>
              <div class="text-muted small mt-2">
                <b>导入规则：</b><br>
                1. 先导入款式、印花、位置（顺序不限）<br>
                2. 再导入限定关系（引用前三项的编号）<br>
                3. 相同编号的记录会自动更新，不会重复插入
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-body"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="mainModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modal-title"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" id="modal-submit">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const api = (url, opts={}) => fetch(url, { headers: {'Content-Type':'application/json'}, ...opts }).then(r => r.json());
const modal = new bootstrap.Modal(document.getElementById('mainModal'));
let modalSubmitFn = null;

// ── Toast ──
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  const b = document.getElementById('toast-body');
  b.textContent = msg;
  t.className = `toast align-items-center border-0 text-bg-${type}`;
  bootstrap.Toast.getOrCreateInstance(t, {delay:3000}).show();
}

// ── Navigation ──
document.querySelectorAll('.nav-link[data-page]').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    link.classList.add('active');
    document.getElementById('page-' + link.dataset.page).classList.add('active');
    if (link.dataset.page === 'styles') loadStyles();
    else if (link.dataset.page === 'prints') loadPrints();
    else if (link.dataset.page === 'positions') loadPositions();
    else if (link.dataset.page === 'restrictions') loadRestrictions();
  });
});

// ── Status badge ──
const statusBadge = (v) => `<span class="badge ${v?'badge-active':'badge-inactive'}">${v?'启用':'禁用'}</span>`;

// ═══════════════ 款式 ═══════════════
async function loadStyles() {
  const kw = document.getElementById('style-search').value;
  const data = await api(`/api/styles/?keyword=${encodeURIComponent(kw)}`);
  const tb = document.querySelector('#style-table tbody');
  tb.innerHTML = data.map(s => `
    <tr>
      <td>${s.code}</td><td>${s.name}</td><td>${s.category||'-'}</td>
      <td>${s.color||'-'}</td><td>${s.description||'-'}</td>
      <td>${statusBadge(s.is_active)}</td>
      <td class="action-btns">
        <button class="btn btn-outline-primary btn-sm" onclick='editStyle(${JSON.stringify(s)})'>编辑</button>
        <button class="btn btn-outline-danger btn-sm" onclick="delStyle(${s.id})">删除</button>
      </td>
    </tr>`).join('');
}

function openModal(type, data={}) {
  let body = '', title = '';
  if (type === 'style') {
    title = data.id ? '编辑款式' : '新增款式';
    body = `
      <div class="mb-3"><label class="form-label">款式编号 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-code" value="${data.code||''}" ${data.id?'readonly':''}></div>
      <div class="mb-3"><label class="form-label">款式名称 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-name" value="${data.name||''}"></div>
      <div class="mb-3"><label class="form-label">品类</label>
        <input class="form-control" id="f-category" value="${data.category||''}"></div>
      <div class="mb-3"><label class="form-label">颜色</label>
        <input class="form-control" id="f-color" value="${data.color||''}"></div>
      <div class="mb-3"><label class="form-label">备注</label>
        <input class="form-control" id="f-description" value="${data.description||''}"></div>
      <div class="form-check"><input class="form-check-input" type="checkbox" id="f-active" ${data.is_active!==false?'checked':''}>
        <label class="form-check-label">启用</label></div>`;
    modalSubmitFn = async () => {
      const payload = { code: f('f-code'), name: f('f-name'), category: f('f-category')||null, color: f('f-color')||null, description: f('f-description')||null, is_active: document.getElementById('f-active').checked };
      if (!payload.code || !payload.name) return toast('编号和名称必填', 'danger');
      const res = data.id ? await api(`/api/styles/${data.id}`, {method:'PUT',body:JSON.stringify(payload)}) : await api('/api/styles/', {method:'POST',body:JSON.stringify(payload)});
      if (res.detail) return toast(res.detail, 'danger');
      modal.hide(); loadStyles(); toast('保存成功');
    };
  } else if (type === 'print') {
    title = data.id ? '编辑印花' : '新增印花';
    body = `
      <div class="mb-3"><label class="form-label">印花编号 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-code" value="${data.code||''}" ${data.id?'readonly':''}></div>
      <div class="mb-3"><label class="form-label">印花名称 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-name" value="${data.name||''}"></div>
      <div class="mb-3"><label class="form-label">图案类型</label>
        <input class="form-control" id="f-pattern_type" value="${data.pattern_type||''}"></div>
      <div class="mb-3"><label class="form-label">色系</label>
        <input class="form-control" id="f-color_scheme" value="${data.color_scheme||''}"></div>
      <div class="mb-3"><label class="form-label">备注</label>
        <input class="form-control" id="f-description" value="${data.description||''}"></div>
      <div class="form-check"><input class="form-check-input" type="checkbox" id="f-active" ${data.is_active!==false?'checked':''}>
        <label class="form-check-label">启用</label></div>`;
    modalSubmitFn = async () => {
      const payload = { code: f('f-code'), name: f('f-name'), pattern_type: f('f-pattern_type')||null, color_scheme: f('f-color_scheme')||null, description: f('f-description')||null, is_active: document.getElementById('f-active').checked };
      if (!payload.code || !payload.name) return toast('编号和名称必填', 'danger');
      const res = data.id ? await api(`/api/prints/${data.id}`, {method:'PUT',body:JSON.stringify(payload)}) : await api('/api/prints/', {method:'POST',body:JSON.stringify(payload)});
      if (res.detail) return toast(res.detail, 'danger');
      modal.hide(); loadPrints(); toast('保存成功');
    };
  } else if (type === 'position') {
    title = data.id ? '编辑位置' : '新增位置';
    body = `
      <div class="mb-3"><label class="form-label">位置编号 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-code" value="${data.code||''}" ${data.id?'readonly':''}></div>
      <div class="mb-3"><label class="form-label">位置名称 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-name" value="${data.name||''}"></div>
      <div class="mb-3"><label class="form-label">区域</label>
        <input class="form-control" id="f-area" value="${data.area||''}"></div>
      <div class="mb-3"><label class="form-label">备注</label>
        <input class="form-control" id="f-description" value="${data.description||''}"></div>
      <div class="form-check"><input class="form-check-input" type="checkbox" id="f-active" ${data.is_active!==false?'checked':''}>
        <label class="form-check-label">启用</label></div>`;
    modalSubmitFn = async () => {
      const payload = { code: f('f-code'), name: f('f-name'), area: f('f-area')||null, description: f('f-description')||null, is_active: document.getElementById('f-active').checked };
      if (!payload.code || !payload.name) return toast('编号和名称必填', 'danger');
      const res = data.id ? await api(`/api/positions/${data.id}`, {method:'PUT',body:JSON.stringify(payload)}) : await api('/api/positions/', {method:'POST',body:JSON.stringify(payload)});
      if (res.detail) return toast(res.detail, 'danger');
      modal.hide(); loadPositions(); toast('保存成功');
    };
  } else if (type === 'restriction') {
    title = data.id ? '编辑限定' : '新增限定';
    // Load dropdowns
    Promise.all([api('/api/styles/?limit=999'), api('/api/positions/?limit=999'), api('/api/prints/?limit=999')]).then(([styles, positions, prints]) => {
      const styleOpts = styles.map(s => `<option value="${s.id}" ${data.style_id==s.id?'selected':''}>${s.code} - ${s.name}</option>`).join('');
      const posOpts = positions.map(p => `<option value="${p.id}" ${data.position_id==p.id?'selected':''}>${p.code} - ${p.name}</option>`).join('');
      const printOpts = prints.map(p => `<option value="${p.id}" ${data.print_id==p.id?'selected':''}>${p.code} - ${p.name}</option>`).join('');
      document.getElementById('modal-body').innerHTML = `
        <div class="mb-3"><label class="form-label">款式 <span class="text-danger">*</span></label>
          <select class="form-select" id="f-style_id" ${data.id?'disabled':''}><option value="">请选择款式</option>${styleOpts}</select></div>
        <div class="mb-3"><label class="form-label">位置 <span class="text-danger">*</span></label>
          <select class="form-select" id="f-position_id" ${data.id?'disabled':''}><option value="">请选择位置</option>${posOpts}</select></div>
        <div class="mb-3"><label class="form-label">印花 <span class="text-danger">*</span></label>
          <select class="form-select" id="f-print_id" ${data.id?'disabled':''}><option value="">请选择印花</option>${printOpts}</select></div>
        <div class="mb-3"><label class="form-label">备注</label>
          <input class="form-control" id="f-remark" value="${data.remark||''}"></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="f-active" ${data.is_active!==false?'checked':''}>
          <label class="form-check-label">启用</label></div>`;
    });
    modalSubmitFn = async () => {
      const payload = {
        style_id: parseInt(fv('f-style_id')), position_id: parseInt(fv('f-position_id')),
        print_id: parseInt(fv('f-print_id')), remark: f('f-remark')||null,
        is_active: document.getElementById('f-active').checked
      };
      if (!payload.style_id || !payload.position_id || !payload.print_id) return toast('款式、位置、印花均必填', 'danger');
      const res = data.id ? await api(`/api/restrictions/${data.id}`, {method:'PUT',body:JSON.stringify({is_active:payload.is_active, remark:payload.remark})})
                          : await api('/api/restrictions/', {method:'POST',body:JSON.stringify(payload)});
      if (res.detail) return toast(res.detail, 'danger');
      modal.hide(); loadRestrictions(); toast('保存成功');
    };
  }
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  modal.show();
}

const f = id => document.getElementById(id)?.value?.trim() || '';
const fv = id => document.getElementById(id)?.value || '';

document.getElementById('modal-submit').addEventListener('click', () => modalSubmitFn && modalSubmitFn());

function editStyle(s) { openModal('style', s); }
async function delStyle(id) {
  if (!confirm('确认删除该款式？关联的限定记录也会删除。')) return;
  await api(`/api/styles/${id}`, {method:'DELETE'}); loadStyles(); toast('删除成功');
}

// ═══════════════ 印花 ═══════════════
async function loadPrints() {
  const kw = document.getElementById('print-search').value;
  const data = await api(`/api/prints/?keyword=${encodeURIComponent(kw)}`);
  document.querySelector('#print-table tbody').innerHTML = data.map(p => `
    <tr>
      <td>${p.code}</td><td>${p.name}</td><td>${p.pattern_type||'-'}</td>
      <td>${p.color_scheme||'-'}</td><td>${p.description||'-'}</td>
      <td>${statusBadge(p.is_active)}</td>
      <td class="action-btns">
        <button class="btn btn-outline-primary btn-sm" onclick='openModal("print",${JSON.stringify(p)})'>编辑</button>
        <button class="btn btn-outline-danger btn-sm" onclick="delPrint(${p.id})">删除</button>
      </td>
    </tr>`).join('');
}
async function delPrint(id) {
  if (!confirm('确认删除该印花？')) return;
  await api(`/api/prints/${id}`, {method:'DELETE'}); loadPrints(); toast('删除成功');
}

// ═══════════════ 位置 ═══════════════
async function loadPositions() {
  const kw = document.getElementById('position-search').value;
  const data = await api(`/api/positions/?keyword=${encodeURIComponent(kw)}`);
  document.querySelector('#position-table tbody').innerHTML = data.map(p => `
    <tr>
      <td>${p.code}</td><td>${p.name}</td><td>${p.area||'-'}</td>
      <td>${p.description||'-'}</td>
      <td>${statusBadge(p.is_active)}</td>
      <td class="action-btns">
        <button class="btn btn-outline-primary btn-sm" onclick='openModal("position",${JSON.stringify(p)})'>编辑</button>
        <button class="btn btn-outline-danger btn-sm" onclick="delPosition(${p.id})">删除</button>
      </td>
    </tr>`).join('');
}
async function delPosition(id) {
  if (!confirm('确认删除该位置？')) return;
  await api(`/api/positions/${id}`, {method:'DELETE'}); loadPositions(); toast('删除成功');
}

// ═══════════════ 限定 ═══════════════
async function loadRestrictions() {
  // Also refresh filter dropdowns
  const [styles, positions] = await Promise.all([api('/api/styles/?limit=999'), api('/api/positions/?limit=999')]);
  const sf = document.getElementById('r-filter-style');
  const pf = document.getElementById('r-filter-position');
  const sv = sf.value, pv = pf.value;
  sf.innerHTML = '<option value="">全部款式</option>' + styles.map(s => `<option value="${s.id}" ${sv==s.id?'selected':''}>${s.name}</option>`).join('');
  pf.innerHTML = '<option value="">全部位置</option>' + positions.map(p => `<option value="${p.id}" ${pv==p.id?'selected':''}>${p.name}</option>`).join('');

  let url = '/api/restrictions/?limit=500';
  if (sf.value) url += `&style_id=${sf.value}`;
  if (pf.value) url += `&position_id=${pf.value}`;
  const data = await api(url);
  document.querySelector('#restriction-table tbody').innerHTML = data.map(r => `
    <tr>
      <td><span class="restriction-tag">${r.style?.code||''}</span> ${r.style?.name||''}</td>
      <td><span class="restriction-tag">${r.position?.code||''}</span> ${r.position?.name||''}</td>
      <td><span class="restriction-tag">${r.print_item?.code||''}</span> ${r.print_item?.name||''}</td>
      <td>${statusBadge(r.is_active)}</td>
      <td>${r.remark||'-'}</td>
      <td class="action-btns">
        <button class="btn btn-outline-primary btn-sm" onclick='openModal("restriction",${JSON.stringify(r).replace(/'/g,"&#39;")})'>编辑</button>
        <button class="btn btn-outline-danger btn-sm" onclick="delRestriction(${r.id})">删除</button>
      </td>
    </tr>`).join('');
}
async function delRestriction(id) {
  if (!confirm('确认删除该限定记录？')) return;
  await api(`/api/restrictions/${id}`, {method:'DELETE'}); loadRestrictions(); toast('删除成功');
}

// ═══════════════ Excel ═══════════════
async function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  const resultDiv = document.getElementById('import-result');
  resultDiv.innerHTML = '<div class="alert alert-info">导入中，请稍候...</div>';
  const res = await fetch('/api/excel/import', { method: 'POST', body: form }).then(r => r.json());
  if (res.success) {
    let html = `<div class="alert alert-success"><b>${res.message}</b>`;
    if (res.details.errors && res.details.errors.length) {
      html += '<hr><b>部分错误：</b><ul>' + res.details.errors.map(e => `<li>${e}</li>`).join('') + '</ul>';
    }
    html += '</div>';
    resultDiv.innerHTML = html;
    toast('导入完成');
  } else {
    resultDiv.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
    toast('导入失败', 'danger');
  }
  input.value = '';
}

// Drag & drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#2563eb'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#cbd5e1'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.borderColor = '#cbd5e1';
  const file = e.dataTransfer.files[0];
  if (file) { const fi = document.getElementById('excel-file'); const dt = new DataTransfer(); dt.items.add(file); fi.files = dt.files; importExcel(fi); }
});

// Initial load
loadStyles();
</script>
